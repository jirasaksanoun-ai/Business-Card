<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กำลังเชื่อมต่อระบบสั่งทำนามบัตร...</title>
  <!-- นำเข้า LINE SDK ตัวหลัก -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="background-color: #0f172a; color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 16px; box-sizing: border-box;">

  <div style="text-align: center; max-width: 320px;">
    <!-- ตัวหมุน Loading แบบ CSS -->
    <div style="border: 4px solid rgba(99, 102, 241, 0.15); border-top: 4px solid #6366f1; border-radius: 50%; width: 44px; height: 44px; animation: spin 0.8s linear infinite; margin: 0 auto 20px;"></div>
    <h3 style="font-size: 16px; font-weight: 600; margin: 0 0 8px 0; letter-spacing: 0.025em;">กำลังยืนยันสิทธิ์บัญชี LINE</h3>
    <p style="font-size: 12px; color: #94a3b8; margin: 0; line-height: 1.5;">ระบบกำลังตรวจสอบสิทธิ์พนักงานเพื่อนำท่านเข้าสู่ฟอร์มสั่งทำนามบัตรโดยอัตโนมัติ...</p>
  </div>

  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <script>
    // ==========================================
    // ⚙️ ตั้งค่าข้อมูลการเชื่อมต่อตรงนี้เพียง 2 จุด
    // ==========================================
    const MY_LIFF_ID = "2009669941-lX13Wwn1"; // 1. ใส่ LIFF ID ที่คุณสร้างใน LINE Developers
    const GAS_WEB_APP_URL = "https://script.google.com/a/macros/rx.co.th/s/AKfycbwjeLWe7Oa6ZRYKtmzwhlUWZzFzjK-E-eOz7ytdSmEfk5l1MFpBX6HLFFldLEvo2tFc/exec"; // 2. ใส่ลิงก์ Web App (ลิงก์ /exec) ของระบบสั่งนามบัตรของคุณ

    window.onload = function() {
      if (MY_LIFF_ID === "YOUR_LIFF_ID_HERE" || GAS_WEB_APP_URL === "YOUR_GAS_WEB_APP_URL_HERE") {
        showError("การตั้งค่าระบบไม่สมบูรณ์: กรุณาระบุรหัส LIFF ID และลิงก์ Web App ของท่านในโค้ดก่อนเริ่มใช้งาน");
        return;
      }

      // เริ่มต้นเชื่อมต่อกับ LINE LIFF SDK
      liff.init({ liffId: MY_LIFF_ID })
        .then(() => {
          if (liff.isLoggedIn()) {
            // ดึงโปรไฟล์พนักงานที่กำลังคลิกใช้งานอยู่
            liff.getProfile()
              .then(profile => {
                const userId = profile.userId;
                // ทำการดีดตัวผู้ใช้ออกจากเบราว์เซอร์ไปที่ Google Web App พร้อมกับแนบพารามิเตอร์ userId ไปด้วยทันที
                window.location.replace(GAS_WEB_APP_URL + "?userId=" + userId);
              })
              .catch(err => {
                showError("ไม่สามารถเข้าถึงโปรไฟล์ LINE ของคุณได้: " + err.message);
              });
          } else {
            // บังคับล็อกอินหากเปิดจากภายนอก
            liff.login();
          }
        })
        .catch(err => {
          showError("LIFF เริ่มการทำงานล้มเหลว: " + err.message);
        });
    };

    function showError(message) {
      document.body.innerHTML = `
        <div style="text-align: center; max-width: 340px; background-color: #1e1b4b; border: 1px solid #312e81; padding: 24px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);">
          <div style="background-color: #ef4444; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-weight: bold; font-size: 20px;">!</div>
          <h4 style="color: #f87171; font-size: 14px; margin: 0 0 8px 0; font-weight: bold;">เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์</h4>
          <p style="font-size: 12px; color: #cbd5e1; margin: 0; line-height: 1.6;">${message}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
